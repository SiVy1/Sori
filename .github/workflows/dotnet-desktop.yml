name: Build Sori

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore YTMusic.slnx

      - name: Build
        run: dotnet build YTMusic.slnx --configuration ${{ matrix.configuration }} --no-restore

      - name: Test
        run: dotnet test Tests/Tests.csproj --configuration ${{ matrix.configuration }} --no-build

      - name: Publish Windows x64
        if: matrix.configuration == 'Release'
        run: dotnet publish Sori.App/Sori.App.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true --output publish/win-x64

      - name: Upload artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: Sori-win-x64
          path: publish/win-x64
